harness: v2
name: tidal
lang: go

# ── observe ──
observe:
  logs:
    - name: git
      cmd: "git log --oneline -20"
    - name: build
      cmd: "go build ./cmd/tidal 2>&1 || true"
  ci:
    cmd: "gh run list --repo {{repo}} --limit 5"
  issues:
    cmd: "gh issue list --repo {{repo}} --state open"

# ── test ──
test:
  build:
    cmd: "go build -o /dev/null ./cmd/tidal"
  unit:
    cmd: "go test ./... -short"

# ── lint ──
lint:
  vet:
    cmd: "go vet ./..."

# ── ship ──
ship:
  pr:
    base: main
    prefix: "tidal/"
    auto_test: true
    template: |
      ## Summary
      {{summary}}
      ## Test
      {{test_output}}
  issue:
    repo: "{{repo}}"
    types:
      feat:
        labels: [enhancement]
      bug:
        labels: [bug]
      chore:
        labels: [chore]
      doc:
        labels: [documentation]

# ── verify ──
verify:
  health:
    cmd: "go build -o /dev/null ./cmd/tidal && echo 'binary builds OK'"
  smoke:
    - name: "cli help"
      cmd: "go run ./cmd/tidal --help > /dev/null"
    - name: "cli status"
      cmd: "go run ./cmd/tidal status"

# ── worktree ──
worktree:
  dir: "/tmp/tidal-worktrees"
  setup: "go mod download"
  cleanup: ""

# ── grade ──
grade:
  test_count:
    cmd: "go test ./... -v -short 2>&1 | grep -c PASS || echo 0"
  file_count:
    cmd: "find . -name '*.go' -not -path './vendor/*' | wc -l | tr -d ' '"

# ── vars ──
vars:
  repo: "oSEAItic/tidal"
  summary: ""
  test_output: ""
