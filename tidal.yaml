harness: v2
name: tidal
lang: go

# ── observe ──
observe:
  logs:
    - name: git
      cmd: "git log --oneline -20"
    - name: build
      cmd: "go build ./cmd/tidal 2>&1 || true"
  ci:
    cmd: "gh run list --repo {{repo}} --limit 5"
  issues:
    cmd: "gh issue list --repo {{repo}} --state open"

# ── test ──
test:
  build:
    cmd: "go build -o /dev/null ./cmd/tidal"
  unit:
    cmd: "go test ./... -short"

# ── lint ──
lint:
  vet:
    cmd: "go vet ./..."

# ── review: analyze changes before shipping ──
review:
  diff:
    cmd: "git diff --stat"
  staged:
    cmd: "git diff --cached --stat"
  secrets:
    cmd: "git diff HEAD | grep -inE '(password|secret|api.?key|token)\\s*[:=]' || echo 'none detected'"
  todos:
    cmd: "git diff HEAD | grep -c TODO || echo 0"
  large_files:
    cmd: "git diff --name-only HEAD | xargs -I{} find {} -size +500l 2>/dev/null || echo 'none'"

# ── ship ──
ship:
  pr:
    base: main
    prefix: "tidal/"
    auto_test: true
    template: |
      ## Summary
      {{summary}}
      ## Test
      {{test_output}}
  issue:
    repo: "{{repo}}"
    types:
      feat:
        labels: [enhancement]
      bug:
        labels: [bug]
      chore:
        labels: [chore]
      doc:
        labels: [documentation]

# ── verify ──
verify:
  health:
    cmd: "go build -o /dev/null ./cmd/tidal && echo 'binary builds OK'"
  smoke:
    - name: "cli help"
      cmd: "go run ./cmd/tidal --help > /dev/null"
    - name: "cli status"
      cmd: "go run ./cmd/tidal status"

# ── worktree ──
worktree:
  dir: "/tmp/tidal-worktrees"
  setup: "go mod download"
  cleanup: ""

# ── grade ──
grade:
  test_count:
    cmd: "go test ./... -v -short 2>&1 | grep -c PASS || echo 0"
  file_count:
    cmd: "find . -name '*.go' -not -path './vendor/*' | wc -l | tr -d ' '"

# ── topology: what is this project ──
topology:
  services:
    - name: tidal-cli
      lang: go
      path: ./cmd/tidal
      depends_on: []

# ── paths: where things are ──
paths:
  cli_entry: "./cmd/tidal/main.go"
  config_pkg: "./internal/config/"
  runner_pkg: "./internal/runner/"
  history_pkg: "./internal/history/"
  docs: "./doc/"
  schema_design: "./doc/schema-v2-design.md"

# ── external: outside dependencies ──
external:
  ci: "GitHub Actions"
  issues: "GitHub Issues"
  repo: "github.com/oSEAItic/tidal"

# ── history: run recording ──
history:
  dir: ".tidal"

# ── vars ──
vars:
  repo: "oSEAItic/tidal"
  summary: ""
  test_output: ""
